- title: Subsequent Implementation of Currencies in SAP S/4HANA
  publishedIn:
    name: 2023 SAP S/4HANA Finance Knowledge-Sharing Document
    date: 7 June 2023
    # url: https://example.com
  authors:
  - name: Mayur Pawar
    url: "https://www.linkedin.com/in/mayurpawar15/"
  - name: Noah Cuffle
    url: "https://www.linkedin.com/in/noah-cuffle"
  # - name: Dr. Moremad
  #   url: https://example.com
  # - name: Dr. Goodman
  #   url: https://example.com
  paper:
    summary: A comprehensive guide on enabling additional currency types for live company codes in SAP S/4HANA. This publication explores the end-to-end approach for introducing new currencies in productive environments, including business drivers, solution design, Universal Journal considerations, historical data conversion, financial reconciliation, testing strategy, and cutover planning. The document provides practical insights and best practices for supporting evolving global reporting and consolidation requirements while maintaining data integrity and financial accuracy.
    # url: https://example.com
  categories: ["S4HANA"]
  tags: ["SAP S/4HANA Finance", "SAP FICO", "Universal Journal", "Currency Conversion", "SAP Finance Transformation", "ERP Implementation"]

