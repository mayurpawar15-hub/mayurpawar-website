- company:
    name: Deloitte
    url: "https://www.deloitte.com/us/en.html"
    location: Atlanta Georgia, USA
    logo: /images/sections/experiences/Deloitte.png
    # Can optionally show a different logo for dark theme
    # darkLogo: /images/sections/experiences/company2.jpg
    overview: Deloitte is a leading global consulting and professional services firm, helping organizations navigate complex business and technology transformations.
  positions:
  - designation: SAP Senior Consultant
    start: May 2022
    end: Jan 2025
    responsibilities:
    - Analyzed and delivered subsequent implementation of ledger and local currency in SAP S/4HANA Finance, helping the client retain and extend an existing landscape of approximately 200 company codes.
    - Acted as SAP FICO subject matter expert in client meetings, providing guidance on finance configuration, Universal Journal considerations, and SAP best practices.
    - Led a team of 7 consultants across enterprise structure, validations and substitutions, intercompany configuration, foreign exchange valuation, and related SAP Finance deliverables.
    - Received an Outstanding award for closing critical go-live path items and supporting multiple successful SAP go-lives.
    - Coached junior resources on SAP FICO configuration, delivery quality, and finance transformation best practices.
    - Identified and resolved process bottlenecks, reducing processing time by 15% and improving customer
      satisfaction.
    - Analyzed existing process scenarios and prepared new business blueprints.
    - Mapped client business requirements to optimal IT solutions, defining project scope and finalizing requirements.
    - Conducted AS-IS and TO-BE analysis, studying workflows, designing solutions, and preparing requirement documents for customer approval.
    - Collaborated with project managers and stakeholders to align project goals, timelines, and deliverables.
    - Contributed to project planning, scheduling, and progress monitoring to ensure successful delivery.
    - Led workshops and briefings on business scenarios that could be mapped in SAP systems for core team
      members and business process owners.
    - Provided continuous support for production system issues while working on rollout and enhancement
      projects.
    - Managed end-to-end implementation projects from kickoff to completion.
  - designation: SAP Consultant
    start: Aug 2019
    end: May 2022
    responsibilities:
    - Led Digital Accounting thread in video game industry.
    - Worked on royalties and SAP FI GL configuration such as building enterprise structure, IC configuration, Custom object development with help of technical team.
    - Advised business on FI closing activities.
    - Compiled and transformed transactional and master data for migration from SAP ECC to SAP S/4HANA.
    - Clarified business questions and worked on profit center, cost center, general ledger hierarchy, and financial statement version design.
    - Diagnosed multiple critical business gaps and proposed robust solution on multiple RICEFW objects.
    - Build a solution to a client on royalty forms and calculations which improved 3rd party royalty process by 80%
  - designation: Business technology analyst
    start: Oct 2016
    end: Sep 2019
    responsibilities:
    - Built a secure solution on credit card payments which helped business to register credit card transactions directly in SAP which helped business to improve reporting by 40%
    - Collaborate with functional consultants and business stakeholders to understand system requirements and translate them into technical specifications.
    - Design, develop, test, and implement custom SAP ABAP programs, reports, interfaces, enhancements, forms
      (SMARTFORMS/Adobe), and user exits.
    - Support SAP modules such as FICO, MM, SD, and HCM by developing and maintaining ABAP solutions aligned
      with business processes.
    - Follow Deloitte's development standards and best practices in ABAP coding, documentation, and transport management.
    - Collaborate in agile or waterfall delivery models, contributing to sprint planning, daily stand-ups, and
      retrospectives when applicable.
    - Prepare technical documentation and contribute to knowledge-sharing within the ABAP team.
    - Provide production support, troubleshoot technical issues, and deliver timely bug fixes for SAP applications.
    - Engage in continuous learning and certifications to keep up with SAP's evolving technologies like S/4HANA,
      Fiori/UI5, CDS views, and OData.

