  positions:
  - designation: Managing Consultant
    start: Jan 2025
    # don't provide end date if you are currently working there. It will be replaced by "Present"
    # end: Dec 2020
    # give some points about what was your responsibilities at the company.
    responsibilities:
    - Lead the SAP Finance workstream for demerger and carve-out activities, defining a roadmap for separating financial structures, reporting entities, and master data.
    - Collaborate with legal, tax, and corporate finance teams to understand the target operating models for each new entity.
    - Identify SAP FICO and SAP S/4HANA Finance objects impacted by the demerger, including company codes, controlling areas, cost centers, profit centers, segments, and reporting structures.
    - Oversee carve-out and migration of historical and open finance data to new SAP environments or clients while protecting reconciliation, auditability, and reporting continuity.
    - Ensure data consistency, integrity, and auditability during the transition.
    - Coordinate with technical teams on SAP Landscape Transformation, custom migration tools, interface impacts, and downstream finance reporting dependencies.
    - Lead the finance track during cutover planning and execution to ensure a smooth transition with minimal business disruption.

