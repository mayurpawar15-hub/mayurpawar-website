# a summary about you
summary: |
  I am an SAP Finance and Transformation Leader with 9+ years of experience delivering large-scale ERP programs across global organizations. My expertise spans SAP S/4HANA Finance, enterprise transformations, carve-outs, mergers, and business process optimization. I am passionate about building scalable solutions, leading high-performing teams, and helping businesses unlock value through technology and innovation.

  Currently, I work on complex SAP Finance initiatives, driving strategy, architecture, and delivery for mission-critical programs. Beyond work, I enjoy exploring emerging technologies, contributing to the tech community, and continuously learning new skills.

