# a summary about you
summary: |
  Mayur Shankar Pawar is an SAP Finance Manager and SAP S/4HANA Finance professional with 9+ years of experience across SAP FICO, Universal Journal, Central Finance, ERP transformation, finance architecture, and global SAP implementations.

  I lead complex SAP Finance initiatives across enterprise transformations, carve-outs, mergers, and finance process modernization. My work focuses on scalable SAP solutions, practical delivery leadership, and helping organizations improve finance operations through technology and sound architecture.

